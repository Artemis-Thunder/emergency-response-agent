repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
-   repo: local
    hooks:
    -   id: semgrep
        name: Semgrep Security Scan
        entry: cmd.exe /c ".venv\Scripts\semgrep.exe scan --error --config .semgrep\rules.yaml"
        language: system
        types: [python]
